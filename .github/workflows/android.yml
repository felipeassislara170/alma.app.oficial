# ─────────────────────────────────────────────────────────────────────────────
#  Android Build & Google Play Upload
#
#  Produces a signed AAB (Android App Bundle) for Google Play.
#
#  Triggers:
#    • push to main          → build + sign + upload to Play Store (Internal track)
#    • pull_request to main  → build + lint only
#    • manual workflow_dispatch
#
#  Required GitHub Secrets:
#    ANDROID_KEYSTORE_BASE64    – base64-encoded .jks / .keystore file
#    ANDROID_KEY_ALIAS          – key alias inside the keystore
#    ANDROID_KEY_PASSWORD        – key password
#    ANDROID_STORE_PASSWORD      – keystore password
#    GOOGLE_PLAY_SERVICE_ACCOUNT_JSON – service account JSON for Play Console
# ─────────────────────────────────────────────────────────────────────────────

name: Android Build & Play Store

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'capacitor.config.ts'
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Setup Node.js ───────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Setup Java ──────────────────────────────────────────────────────────
      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # ── Setup Android SDK ───────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Install dependencies ────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── Build React web app ─────────────────────────────────────────────────
      - name: Build web app
        run: npm run build

      # ── Initialize Capacitor Android (if android/ folder doesn't exist) ─────
      - name: Initialize Capacitor Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      # ── Decode signing keystore ─────────────────────────────────────────────
      - name: Decode keystore
        if: github.event_name != 'pull_request' && secrets.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo -n "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      # ── Build debug APK (for PRs) ───────────────────────────────────────────
      - name: Build debug APK
        if: github.event_name == 'pull_request'
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── Build release AAB (for main) ────────────────────────────────────────
      - name: Build release AAB
        if: github.event_name != 'pull_request' && secrets.ANDROID_KEYSTORE_BASE64 != ''
        working-directory: android
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/keystore.jks \
            -Pandroid.injected.signing.store.password="$ANDROID_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD" \
            --no-daemon

      # ── Upload APK artifact (PRs) ───────────────────────────────────────────
      - name: Upload debug APK
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: Alma-debug-${{ github.sha }}.apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      # ── Upload AAB artifact ─────────────────────────────────────────────────
      - name: Upload release AAB
        if: github.event_name != 'pull_request' && secrets.ANDROID_KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: Alma-${{ github.sha }}.aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      # ── Upload to Google Play (Internal track) ──────────────────────────────
      - name: Upload to Google Play (Internal)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.ANDROID_KEYSTORE_BASE64 != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: AlmaOficial.Alma
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
          whatsNewDirectory: fastlane/metadata/android/pt-BR/changelogs
