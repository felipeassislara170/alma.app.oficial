# ─────────────────────────────────────────────────────────────────────────────
#  iOS Build & TestFlight Upload
#
#  Triggers:
#    • push to main          → build + archive + upload to TestFlight
#    • pull_request to main  → build only (no upload)
#    • manual workflow_dispatch
#
#  Required GitHub Secrets (add under Settings → Secrets → Actions):
#    APPLE_ID                  – your Apple ID email
#    APPLE_APP_SPECIFIC_PASSWORD – App-specific password (appleid.apple.com)
#    APPLE_TEAM_ID             – your 10-character Apple Developer Team ID
#    BUILD_CERTIFICATE_BASE64  – base64-encoded .p12 file (see DEPLOY.md)
#    BUILD_CERTIFICATE_PASSWORD – .p12 password
#    PROVISION_PROFILE_BASE64  – base64-encoded .mobileprovision
#    KEYCHAIN_PASSWORD         – any random password for the temporary keychain
# ─────────────────────────────────────────────────────────────────────────────

name: iOS Build & TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14          # Xcode 15 — free on GitHub Actions
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Select Xcode version ─────────────────────────────────────────────
      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      # ── Install signing certificate + provisioning profile ───────────────
      - name: Install signing certificate
        if: github.event_name != 'pull_request' && secrets.BUILD_CERTIFICATE_BASE64 != ''
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_CERTIFICATE_PASSWORD: ${{ secrets.BUILD_CERTIFICATE_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode certificate
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          security import $CERT_PATH -P "$BUILD_CERTIFICATE_PASSWORD" -A \
            -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      # ── Build (unsigned for PRs, archived for main) ──────────────────────
      - name: Build (PR — no signing)
        if: github.event_name == 'pull_request'
        run: |
          xcodebuild \
            -project ios/Alma.xcodeproj \
            -scheme Alma \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Archive for App Store
        if: github.event_name != 'pull_request' && secrets.BUILD_CERTIFICATE_BASE64 != ''
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -project ios/Alma.xcodeproj \
            -scheme Alma \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Alma.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            archive

      - name: Export IPA
        if: github.event_name != 'pull_request' && secrets.BUILD_CERTIFICATE_BASE64 != ''
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Note: unquoted EOF (not 'EOF') is intentional — we need ${APPLE_TEAM_ID} expanded.
          # The plist body is static XML with no other shell metacharacters.
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Alma.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      # ── Upload IPA as artifact ──────────────────────────────────────────
      - name: Upload IPA artifact
        if: github.event_name != 'pull_request' && secrets.BUILD_CERTIFICATE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: Alma-${{ github.sha }}.ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30

      # ── Setup Ruby + Fastlane for TestFlight upload ──────────────────────
      - name: Setup Ruby
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.APPLE_ID != '' && secrets.BUILD_CERTIFICATE_BASE64 != ''
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      # ── Upload to TestFlight via Fastlane ────────────────────────────────
      #    xcrun altool --upload-app was removed in Xcode 15; Fastlane's
      #    upload_to_testflight uses the App Store Connect API instead.
      - name: Upload to TestFlight
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.APPLE_ID != '' && secrets.BUILD_CERTIFICATE_BASE64 != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          IPA_PATH=$(find $RUNNER_TEMP/ipa -name '*.ipa' | head -1)
          bundle exec fastlane run upload_to_testflight \
            ipa:"$IPA_PATH" \
            username:"$APPLE_ID" \
            skip_waiting_for_build_processing:true

      # ── Clean up keychain ────────────────────────────────────────────────
      - name: Clean up keychain
        if: always() && github.event_name != 'pull_request' && secrets.BUILD_CERTIFICATE_BASE64 != ''
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
