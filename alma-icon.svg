<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0f0a1e"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F6AD55"/>
      <stop offset="50%" stop-color="#9F7AEA"/>
      <stop offset="100%" stop-color="#6B46C1"/>
    </linearGradient>
    <linearGradient id="symGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#E9D8FD" stop-opacity="0.88"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#9F7AEA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9F7AEA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Inner glow -->
  <circle cx="256" cy="256" r="230" fill="url(#glowGrad)"/>

  <!-- Gradient outer ring -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="url(#ringGrad)" stroke-width="10" opacity="0.9"/>

  <!-- Thin inner ring accent -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="rgba(159,122,234,0.2)" stroke-width="1.5"/>

  <!-- Symbol: spirit / flame — head circle -->
  <circle cx="256" cy="138" r="26" fill="url(#symGrad)"/>

  <!-- Symbol: flowing body/flame -->
  <path d="M228 163
           Q194 210 194 258
           Q194 328 256 384
           Q318 328 318 258
           Q318 210 284 163
           Q270 175 256 178
           Q242 175 228 163 Z"
        fill="url(#symGrad)"/>

  <!-- Inner depth cut-out to give 3-D feel -->
  <path d="M244 188
           Q226 228 226 258
           Q226 308 256 356
           Q286 308 286 258
           Q286 228 268 188
           Q262 194 256 196
           Q250 194 244 188 Z"
        fill="url(#bgGrad)" opacity="0.45"/>
</svg>
